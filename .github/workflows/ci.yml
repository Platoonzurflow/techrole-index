name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  citation-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check cffconvert==2.0.0
      - run: cffconvert --validate -i CITATION.cff

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e "backend[dev]"
      - run: ruff check .
        working-directory: backend
      - run: mypy app
        working-directory: backend
      - run: pytest
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      INTERNAL_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.14.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm lint
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - run: pnpm prepare:standalone
        working-directory: frontend

  compose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PAYMENTS_ENABLED: "true"
      PAYMENTS_PROVIDER: demo
      PAYMENTS_MODE: test
      PAYMENTS_TERMS_VERSION: draft-ci
      PREMIUM_30_DAYS_PRICE_RUB: "1.00"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose -f compose.yaml -f compose.public.yaml --profile public config --quiet
      - run: docker compose -f compose.yaml -f compose.production.yaml config --quiet
      - name: Validate rendered production security contract
        env:
          APP_SECRET_KEY: ci-production-secret-0123456789-abcdefghijklmnop
          DATABASE_URL: postgresql+psycopg://techrole_ci:ci-database-password-0123456789@postgres:5432/techrole_ci
          FRONTEND_ORIGIN: https://ci.techrole.example
          NEXT_PUBLIC_DATA_MODE: live
          NEXT_PUBLIC_SITE_URL: https://ci.techrole.example
          POSTGRES_DB: techrole_ci
          POSTGRES_PASSWORD: ci-database-password-0123456789
          POSTGRES_USER: techrole_ci
          PUBLIC_BASE_URL: https://ci.techrole.example
          SITE_ADDRESS: https://ci.techrole.example
        run: docker compose -f compose.yaml -f compose.production.yaml --profile production config --format json | node infra/validate-production-config.mjs
      - run: docker compose -f compose.yaml -f compose.observability.yaml --profile observability config --quiet
      - run: docker compose up --build -d frontend
      - name: Validate and load Croissant metadata
        run: |
          python -m pip install --disable-pip-version-check mlcroissant==1.1.0
          mlcroissant validate --jsonld=http://127.0.0.1:3000/open-data-daily.croissant.json
          mlcroissant load --jsonld=http://127.0.0.1:3000/open-data-daily.croissant.json --record_set=observed_publication_daily --num_records=3
      - run: docker compose --profile e2e run --rm e2e
      - name: Reset frontend memory before the full public crawl
        run: |
          docker compose restart frontend
          docker compose up -d --wait frontend
      - name: Audit public pages serially on the development server
        run: docker compose exec -T -e PUBLIC_AUDIT_CONCURRENCY=1 frontend npm run audit:public
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 backend frontend postgres redis
      - name: Stop test environment
        if: always()
        run: docker compose down --volumes --remove-orphans
